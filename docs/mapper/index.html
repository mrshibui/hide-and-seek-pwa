<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mapper">
  <meta name="theme-color" content="#1F2938">
  <title>Mapper</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="leaflet/leaflet.min.css">
  <style>
    :root {
      --red:      #CC2E2E;
      --blue:     #2E6BD1;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    /* ── Map fills full viewport ── */
    #map {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Fill overlay canvas ── */
    #fill-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 400; /* above Leaflet tiles, below controls */
    }

    /* ── Instruction banner ── */
    #banner {
      position: fixed;
      top: calc(12px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 600;
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 999px;
      padding: 10px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      white-space: nowrap;
    }
    #banner.visible { display: flex; }
    #banner span { font-size: 14px; font-weight: 500; color: #1A1A1A; }
    #banner-close {
      background: none; border: none; padding: 0; cursor: pointer;
      color: #888; font-size: 18px; line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Top-right floating map controls ── */
    #map-btns {
      position: fixed;
      top: calc(12px + var(--safe-top));
      right: 16px;
      z-index: 600;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .map-btn {
      width: 44px; height: 44px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.22);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s;
    }
    .map-btn:active { transform: scale(0.9); }
    .map-btn svg { width: 18px; height: 18px; }

    /* ── Bottom panel ── */
    #bottom-panel {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      z-index: 600;
      background: rgba(248,248,250,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,0,0,0.1);
      padding-bottom: var(--safe-bot);
    }

    /* Radius preset picker */
    #radius-picker {
      display: none;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 10px 16px;
      gap: 10px;
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }
    #radius-picker.visible {
      display: flex;
    }
    #radius-picker::-webkit-scrollbar { display: none; }
    .radius-chip {
      flex-shrink: 0;
      padding: 9px 18px;
      border: none;
      border-radius: 999px;
      background: var(--red);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s;
    }
    .radius-chip:active { transform: scale(0.93); }

    /* Toolbar */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
    }
    .tool-btn {
      width: 44px; height: 44px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s;
    }
    .tool-btn:active { transform: scale(0.9); }
    .tool-btn svg { width: 20px; height: 20px; }
    .tool-btn.active { background: var(--red) !important; }
    .tool-btn.active svg { color: white; }
    .tool-btn:disabled { opacity: 0.35; cursor: default; }
    .tool-spacer { flex: 1; }

    /* ── User location dot ── */
    .user-dot-outer {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: rgba(46,107,209,0.25);
      display: flex; align-items: center; justify-content: center;
    }
    .user-dot-inner {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #2E6BD1;
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* Leaflet attribution tweak */
    .leaflet-control-attribution {
      font-size: 10px !important;
      background: rgba(255,255,255,0.7) !important;
    }
  </style>
</head>
<body>

<div id="map"></div>
<canvas id="fill-canvas"></canvas>

<!-- Instruction banner -->
<div id="banner">
  <span id="banner-text"></span>
  <button id="banner-close" onclick="cancelTool()">✕</button>
</div>

<!-- Top-right map control buttons -->
<div id="map-btns">
  <button class="map-btn" style="background:#2E6BD1" title="Centreer op mij" onclick="centerOnMe()">
    <svg viewBox="0 0 24 24" fill="white">
      <path d="M12 2a7 7 0 0 1 7 7c0 5.25-7 13-7 13S5 14.25 5 9a7 7 0 0 1 7-7z"/>
      <circle cx="12" cy="9" r="2.5" fill="rgba(255,255,255,0.9)"/>
    </svg>
  </button>
  <button class="map-btn" style="background:#8E8E93" title="Inzoomen" onclick="map.zoomIn()">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
  <button class="map-btn" style="background:#8E8E93" title="Uitzoomen" onclick="map.zoomOut()">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</div>

<!-- Bottom panel -->
<div id="bottom-panel">
  <!-- Radius preset chips (shown during radiusPicking) -->
  <div id="radius-picker" id="radius-picker"></div>

  <!-- Main toolbar -->
  <div id="toolbar">
    <!-- Undo -->
    <button class="tool-btn" id="btn-undo" style="background:#E5E5EA" disabled title="Ongedaan maken" onclick="doUndo()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9,14 4,9 9,4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
      </svg>
    </button>
    <!-- Redo -->
    <button class="tool-btn" id="btn-redo" style="background:#E5E5EA" disabled title="Opnieuw" onclick="doRedo()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15,14 20,9 15,4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/>
      </svg>
    </button>

    <div class="tool-spacer"></div>

    <!-- Radius tool (circle from user location) -->
    <button class="tool-btn" id="btn-radius" style="background:#E5E5EA" title="Straalcirkel" onclick="toggleTool('radius')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 2">
        <circle cx="12" cy="12" r="9"/>
      </svg>
    </button>

    <!-- Point-radius tool (circle from tapped center) -->
    <button class="tool-btn" id="btn-pointradius" style="background:#E5E5EA" title="Puntcirkel" onclick="toggleTool('pointradius')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="8"/>
        <line x1="12" y1="2"  x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2"  y1="12" x2="5"  y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
      </svg>
    </button>

    <!-- Distance / half-plane tool -->
    <button class="tool-btn" id="btn-distance" style="background:#E5E5EA" title="Halvevlak" onclick="toggleTool('distance')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="12" y="3" width="9" height="18" rx="1" fill="currentColor" opacity="0.3"/>
        <line x1="12" y1="2" x2="12" y2="22"/>
      </svg>
    </button>
  </div>
</div>

<script src="leaflet/leaflet.min.js"></script>
<script>
'use strict';

// ── Tell Leaflet where its images are ─────────────────
L.Icon.Default.imagePath = 'leaflet/images/';

// ── State ──────────────────────────────────────────────
const S = {
  layers:      [],    // committed { id, type, ...params }
  undoneStack: [],
  toolMode:    'none',
  // toolData depends on mode:
  // radius:      { radius (meters), center: {lat,lng} }  ← after preset chosen
  // pointradius: { center: {lat,lng} }                   ← after first tap
  //              { radius, center }                      ← after second confirmation
  // distance:    { targetPoint: {lat,lng} }              ← after first tap
  toolData:    {},
  userLocation: null, // { lat, lng }
};

// ── Leaflet map ────────────────────────────────────────
const map = L.map('map', {
  zoomControl: false,
  attributionControl: true,
  center: [52.3676, 4.9041], // Amsterdam — fallback before GPS fix
  zoom: 14,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

// ── Fill canvas overlay ────────────────────────────────
const canvas = document.getElementById('fill-canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resizeCanvas(); redrawFills(); });
resizeCanvas();

map.on('move zoom viewreset resize', redrawFills);

function redrawFills() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (S.layers.length === 0) return;

  // Draw all committed layers on an offscreen canvas at full opacity,
  // then composite the whole thing at 0.35 — this prevents overlapping
  // regions from darkening (equivalent to Swift's beginTransparencyLayer).
  let off;
  try {
    off = new OffscreenCanvas(canvas.width, canvas.height);
  } catch (e) {
    // Fallback for older Safari
    off = document.createElement('canvas');
    off.width  = canvas.width;
    off.height = canvas.height;
  }
  const offCtx = off.getContext('2d');
  offCtx.fillStyle = '#CC2E2E';

  for (const layer of S.layers) {
    if (layer.type === 'radius') {
      drawRadiusFill(offCtx, layer.center, layer.radius, layer.inside);
    } else if (layer.type === 'distance') {
      drawHalfPlaneFill(offCtx, layer.userLocation, layer.targetPoint, layer.sideA);
    }
  }

  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.drawImage(off, 0, 0);
  ctx.restore();
}

// Convert {lat,lng} → canvas pixel point
function toPixel(latlng) {
  const p = map.latLngToContainerPoint(L.latLng(latlng.lat, latlng.lng));
  return { x: p.x, y: p.y };
}

// Convert meters → canvas pixels at a given latitude
function metersToPixels(meters, lat) {
  const dlng = meters / (111320 * Math.cos(lat * Math.PI / 180));
  const p1 = map.latLngToContainerPoint(L.latLng(lat, 0));
  const p2 = map.latLngToContainerPoint(L.latLng(lat, dlng));
  return Math.abs(p2.x - p1.x);
}

function drawRadiusFill(c, center, radiusMeters, inside) {
  const cp = toPixel(center);
  const rPx = metersToPixels(radiusMeters, center.lat);
  if (inside) {
    c.beginPath();
    c.arc(cp.x, cp.y, rPx, 0, Math.PI * 2);
    c.fill();
  } else {
    // Fill everything outside the circle (even-odd)
    const big = Math.max(canvas.width, canvas.height) * 3;
    c.beginPath();
    c.rect(-big, -big, big * 3, big * 3);
    c.arc(cp.x, cp.y, rPx, 0, Math.PI * 2);
    c.fill('evenodd');
  }
}

function drawHalfPlaneFill(c, userLoc, targetPoint, sideA) {
  const uPt = toPixel(userLoc);
  const tPt = toPixel(targetPoint);
  const dx = tPt.x - uPt.x;
  const dy = tPt.y - uPt.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 1) return;

  const big = Math.max(canvas.width, canvas.height) * 5;
  const s = sideA ? 1 : -1;

  const pA = { x: uPt.x + (-dy / len) * big, y: uPt.y + ( dx / len) * big };
  const pB = { x: uPt.x - (-dy / len) * big, y: uPt.y - ( dx / len) * big };
  const c1 = { x: pA.x + (dx / len) * s * big, y: pA.y + (dy / len) * s * big };
  const c2 = { x: pB.x + (dx / len) * s * big, y: pB.y + (dy / len) * s * big };

  c.beginPath();
  c.moveTo(pA.x, pA.y);
  c.lineTo(c1.x, c1.y);
  c.lineTo(c2.x, c2.y);
  c.lineTo(pB.x, pB.y);
  c.closePath();
  c.fill();
}

// ── Tap-side geometry ──────────────────────────────────
// Returns true when tapPoint is on the same side as the direction from user→target.
// Uses lat/lng directly (good enough for typical game distances).
function tapIsOnSideA(userLoc, targetPoint, tapPoint) {
  const dx = targetPoint.lng - userLoc.lng;
  const dy = targetPoint.lat - userLoc.lat;
  const dot = (tapPoint.lng - userLoc.lng) * dx + (tapPoint.lat - userLoc.lat) * dy;
  return dot > 0;
}

// ── Preview overlays ───────────────────────────────────
let previewCircle = null;
let previewLine   = null;
let targetMarker  = null;

function removePreviewCircle() {
  if (previewCircle) { map.removeLayer(previewCircle); previewCircle = null; }
}
function removePreviewLine() {
  if (previewLine) { map.removeLayer(previewLine); previewLine = null; }
}
function removeTargetMarker() {
  if (targetMarker) { map.removeLayer(targetMarker); targetMarker = null; }
}
function clearAllPreviews() {
  removePreviewCircle();
  removePreviewLine();
  removeTargetMarker();
}

function showPreviewCircle(center, radiusMeters) {
  removePreviewCircle();
  previewCircle = L.circle([center.lat, center.lng], {
    radius: radiusMeters,
    color: '#CC2E2E',
    weight: 2,
    dashArray: '8 6',
    fill: false,
    opacity: 0.8,
  }).addTo(map);
}

function showPerpendicularLine(userLoc, targetPoint) {
  removePreviewLine();
  // Compute the two far endpoints of the perpendicular line
  const coords = perpendicularLineCoords(userLoc, targetPoint);
  previewLine = L.polyline(coords, {
    color: '#CC2E2E',
    weight: 2,
    dashArray: '8 6',
    opacity: 0.9,
  }).addTo(map);

  removeTargetMarker();
  targetMarker = L.circleMarker([targetPoint.lat, targetPoint.lng], {
    radius: 6,
    color: '#CC2E2E',
    fillColor: '#CC2E2E',
    fillOpacity: 1,
    weight: 2,
  }).addTo(map);
}

// Perpendicular line endpoint coords in lat/lng
// Uses a pixel-space calculation then unprojects back to latlng
function perpendicularLineCoords(userLoc, targetPoint) {
  const uPt = map.latLngToLayerPoint(L.latLng(userLoc.lat, userLoc.lng));
  const tPt = map.latLngToLayerPoint(L.latLng(targetPoint.lat, targetPoint.lng));
  const dx = tPt.x - uPt.x;
  const dy = tPt.y - uPt.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 1) return [[userLoc.lat, userLoc.lng], [userLoc.lat, userLoc.lng]];

  const big = 50000; // large in pixel units
  const pA = map.layerPointToLatLng(L.point(uPt.x + (-dy / len) * big, uPt.y + (dx / len) * big));
  const pB = map.layerPointToLatLng(L.point(uPt.x - (-dy / len) * big, uPt.y - (dx / len) * big));
  return [[pA.lat, pA.lng], [pB.lat, pB.lng]];
}

// ── User location marker ───────────────────────────────
let userMarker = null;

function updateUserMarker(loc) {
  const icon = L.divIcon({
    html: `<div class="user-dot-outer"><div class="user-dot-inner"></div></div>`,
    className: '',
    iconSize: [20, 20],
    iconAnchor: [10, 10],
  });
  if (!userMarker) {
    userMarker = L.marker([loc.lat, loc.lng], { icon, interactive: false, zIndexOffset: 1000 }).addTo(map);
  } else {
    userMarker.setLatLng([loc.lat, loc.lng]);
    userMarker.setIcon(icon);
  }
}

// ── Geolocation ────────────────────────────────────────
let firstFix = true;

function startGeolocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(
    pos => {
      S.userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      updateUserMarker(S.userLocation);
      if (firstFix) {
        firstFix = false;
        map.setView([S.userLocation.lat, S.userLocation.lng], 15);
      }
    },
    err => console.warn('GPS error:', err.message),
    { enableHighAccuracy: true, maximumAge: 5000 }
  );
}

function centerOnMe() {
  if (S.userLocation) {
    map.setView([S.userLocation.lat, S.userLocation.lng], map.getZoom());
  }
}

// ── Tool logic ─────────────────────────────────────────
const PRESETS = [
  { label: '100 m',  m: 100    },
  { label: '250 m',  m: 250    },
  { label: '500 m',  m: 500    },
  { label: '1 km',   m: 1000   },
  { label: '2 km',   m: 2000   },
  { label: '5 km',   m: 5000   },
  { label: '10 km',  m: 10000  },
  { label: '25 km',  m: 25000  },
  { label: '50 km',  m: 50000  },
  { label: '100 km', m: 100000 },
];

function toggleTool(tool) {
  // Toggle off if already active in any phase
  const modeFamily = {
    radius:      ['radiusPicking', 'radiusCircleShown'],
    pointradius: ['pointRadiusPicking', 'pointRadiusCircleShown'],
    distance:    ['distancePickingPoint', 'distanceLineShown'],
  };
  if (modeFamily[tool] && modeFamily[tool].includes(S.toolMode)) {
    cancelTool();
    return;
  }
  cancelTool();
  if (tool === 'radius') {
    S.toolMode = 'radiusPicking';
  } else if (tool === 'pointradius') {
    S.toolMode = 'pointRadiusPicking';
  } else if (tool === 'distance') {
    S.toolMode = 'distancePickingPoint';
  }
  updateUI();
}

function cancelTool() {
  S.toolMode = 'none';
  S.toolData = {};
  clearAllPreviews();
  updateUI();
}

function selectRadius(meters) {
  if (!S.userLocation) { cancelTool(); return; }
  S.toolData = { radius: meters, center: S.userLocation };
  S.toolMode = 'radiusCircleShown';
  showPreviewCircle(S.toolData.center, meters);
  updateUI();
}

// ── Map tap handler ────────────────────────────────────
map.on('click', e => {
  const tap = { lat: e.latlng.lat, lng: e.latlng.lng };

  switch (S.toolMode) {
    case 'radiusCircleShown': {
      const { radius, center } = S.toolData;
      const dist = map.distance([tap.lat, tap.lng], [center.lat, center.lng]);
      const inside = dist < radius;
      commitLayer({ id: uid(), type: 'radius', center, radius, inside });
      cancelTool();
      break;
    }
    case 'pointRadiusPicking': {
      if (!S.userLocation) { cancelTool(); return; }
      const dist = map.distance(
        [S.userLocation.lat, S.userLocation.lng], [tap.lat, tap.lng]
      );
      S.toolData = { radius: dist, center: tap };
      S.toolMode = 'pointRadiusCircleShown';
      showPreviewCircle(tap, dist);
      updateUI();
      break;
    }
    case 'pointRadiusCircleShown': {
      const { radius, center } = S.toolData;
      const dist = map.distance([tap.lat, tap.lng], [center.lat, center.lng]);
      const inside = dist < radius;
      commitLayer({ id: uid(), type: 'radius', center, radius, inside });
      cancelTool();
      break;
    }
    case 'distancePickingPoint': {
      S.toolData = { targetPoint: tap };
      S.toolMode = 'distanceLineShown';
      if (S.userLocation) showPerpendicularLine(S.userLocation, tap);
      updateUI();
      break;
    }
    case 'distanceLineShown': {
      if (!S.userLocation) { cancelTool(); return; }
      const sideA = tapIsOnSideA(S.userLocation, S.toolData.targetPoint, tap);
      commitLayer({ id: uid(), type: 'distance', userLocation: S.userLocation, targetPoint: S.toolData.targetPoint, sideA });
      cancelTool();
      break;
    }
    default:
      break;
  }
});

// ── Layer management ───────────────────────────────────
function commitLayer(layer) {
  S.layers.push(layer);
  S.undoneStack = [];
  redrawFills();
  updateUI();
}

function doUndo() {
  const last = S.layers.pop();
  if (last) { S.undoneStack.push(last); redrawFills(); updateUI(); }
}

function doRedo() {
  const last = S.undoneStack.pop();
  if (last) { S.layers.push(last); redrawFills(); updateUI(); }
}

// ── UI update ──────────────────────────────────────────
const INSTRUCTIONS = {
  radiusCircleShown:      'Tik binnen of buiten de cirkel',
  pointRadiusPicking:     'Tik het middelpunt van de cirkel',
  pointRadiusCircleShown: 'Tik binnen of buiten de cirkel',
  distancePickingPoint:   'Tik een punt op de kaart',
  distanceLineShown:      'Tik een kant van de lijn',
};

function updateUI() {
  // Banner
  const instr = INSTRUCTIONS[S.toolMode];
  const banner = document.getElementById('banner');
  if (instr) {
    document.getElementById('banner-text').textContent = instr;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }

  // Radius picker visibility
  const picker = document.getElementById('radius-picker');
  if (S.toolMode === 'radiusPicking') {
    picker.classList.add('visible');
  } else {
    picker.classList.remove('visible');
  }

  // Tool button highlight
  const radiusModes     = ['radiusPicking', 'radiusCircleShown'];
  const pointRadModes   = ['pointRadiusPicking', 'pointRadiusCircleShown'];
  const distanceModes   = ['distancePickingPoint', 'distanceLineShown'];
  document.getElementById('btn-radius').classList.toggle('active', radiusModes.includes(S.toolMode));
  document.getElementById('btn-pointradius').classList.toggle('active', pointRadModes.includes(S.toolMode));
  document.getElementById('btn-distance').classList.toggle('active', distanceModes.includes(S.toolMode));

  // Undo/redo buttons
  document.getElementById('btn-undo').disabled = S.layers.length === 0;
  document.getElementById('btn-redo').disabled = S.undoneStack.length === 0;
}

// ── Radius picker chips ────────────────────────────────
function buildRadiusPicker() {
  const picker = document.getElementById('radius-picker');
  picker.innerHTML = PRESETS.map(p =>
    `<button class="radius-chip" onclick="selectRadius(${p.m})">${p.label}</button>`
  ).join('');
}

// ── UUID ───────────────────────────────────────────────
function uid() {
  return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
}

// ── Init ───────────────────────────────────────────────
buildRadiusPicker();
startGeolocation();
updateUI();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
